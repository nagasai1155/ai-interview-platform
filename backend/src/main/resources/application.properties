
spring.application.name=backend
server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3306/ai_interview
spring.datasource.username=root
spring.datasource.password=Nagasai@6302

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=your-256-bit-secret-key-here-make-it-long-and-random-atleast-32chars
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

# OAuth2 GitHub
spring.security.oauth2.client.registration.github.client-id=YOUR_GITHUB_CLIENT_ID
spring.security.oauth2.client.registration.github.client-secret=YOUR_GITHUB_CLIENT_SECRET
spring.security.oauth2.client.registration.github.scope=user:email

# Frontend URL (for OAuth2 redirect)
app.frontend-url=http://localhost:3000